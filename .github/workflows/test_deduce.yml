name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  static:
    name: static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-lsp.txt
            gh_pages/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f ./gh_pages/requirements.txt ]; then pip install -r ./gh_pages/requirements.txt; fi
          if [ -f requirements-lsp.txt ]; then pip install -r requirements-lsp.txt; fi
          pip install ruff mypy

      - name: Lint with ruff
        run: ruff check .

      - name: Type-check with mypy
        run: mypy .

      - name: Check known tokens
        run: python ./gh_pages/scripts/keywords.py

      - name: Check reference grammar snippets
        run: python ./gh_pages/scripts/reference_grammar.py

  regression:
    name: regression (${{ matrix.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Long categories are fanned across parallel shards with ``--shard
        # i/n`` so no single leg dominates wall-clock; every item lands in
        # exactly one shard, so coverage is unchanged. ``test/prelude`` is its
        # own leg (``--prelude``) because it needs the expensive stdlib
        # bootstrap that should-validate does not. Bump a shard count if a leg
        # creeps back over budget. (See issue #1049.)
        include:
          - name: site
            args: --site
            requirements: site
          - name: parser
            args: --parser
            requirements: core
          - name: lib-1
            args: --lib --shard 1/3
            requirements: core
          - name: lib-2
            args: --lib --shard 2/3
            requirements: core
          - name: lib-3
            args: --lib --shard 3/3
            requirements: core
          - name: passable-1
            args: --passable --cli --shard 1/2
            requirements: core
          - name: passable-2
            args: --passable --shard 2/2
            requirements: core
          - name: prelude
            args: --prelude
            requirements: core
          - name: errors
            args: --errors
            requirements: core
          - name: warns
            args: --warns
            requirements: core
          - name: equiv-1
            args: --equiv --shard 1/3
            requirements: core
          - name: equiv-2
            args: --equiv --shard 2/3
            requirements: core
          - name: equiv-3
            args: --equiv --shard 3/3
            requirements: core
          - name: examples
            args: --examples
            requirements: core

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            gh_pages/requirements.txt

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install site dependencies
        if: matrix.requirements == 'site'
        run: |
          if [ -f ./gh_pages/requirements.txt ]; then pip install -r ./gh_pages/requirements.txt; fi

      - name: Run regression category
        run: python test-deduce.py ${{ matrix.args }}
